name: CI

on:
  push:
    branches: ["master", "claude/**"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # La suite s'exécute sur le repli SQLite (aucun PostgreSQL requis en CI)
      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  frontend-syntax:
    name: Dashboard JS syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check app.js
        run: node --check fiskr/static/app.js
