<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiskr - Connexion Conformité AML/CFT</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/static/styles.css?v=3.1">
    <!-- Thème appliqué avant le premier rendu (pas de flash) -->
    <script>
        (function () {
            try {
                var theme = localStorage.getItem("fiskr_theme");
                if (theme === "light" || theme === "dark") {
                    document.documentElement.setAttribute("data-theme", theme);
                }
            } catch (e) { /* thème sombre par défaut */ }
        })();
    </script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-main);
            background-image: 
                radial-gradient(circle at 75% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 25% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 45%);
            padding: 1.5rem;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--card-radius);
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(99, 102, 241, 0.1);
            animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.25);
            border-radius: 16px;
            font-size: 2.25rem;
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .login-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--color-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.35rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .login-form .form-group {
            margin-bottom: 1.25rem;
        }

        .login-form label {
            display: block;
            font-size: 0.825rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: var(--transition-fast);
            outline: none;
        }

        .login-form input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: var(--input-bg-focus);
        }

        .alert-banner {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-banner.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger-soft-text);
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-hover) 100%);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            transition: var(--transition-fast);
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">⚓</div>
            <h1 class="login-title">FISKR</h1>
            <p class="login-subtitle">Plateforme de Conformité & Criblage Sanctions</p>
        </div>

        <div id="error-banner" class="alert-banner error">
            <span>⚠️</span>
            <span id="error-message">Identifiants invalides</span>
        </div>

        <form class="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Ex: admin" autofocus>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            </div>

            <div class="form-group" id="totp-group" style="display: none;">
                <label for="totp-code">Code de vérification (MFA)</label>
                <input type="text" id="totp-code" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                       autocomplete="one-time-code" placeholder="123456">
            </div>

            <button type="submit" id="submit-btn" class="btn-login">
                Se Connecter
            </button>
        </form>

        <div class="login-footer">
            Fiskr Security Engine • Identification requise (ACPR / AMF)
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const errorBanner = document.getElementById("error-banner");
            const errorMessage = document.getElementById("error-message");
            const submitBtn = document.getElementById("submit-btn");

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) return;

            errorBanner.style.display = "none";
            submitBtn.disabled = true;
            submitBtn.textContent = "Connexion en cours...";

            try {
                const totpGroup = document.getElementById("totp-group");
                const totpInput = document.getElementById("totp-code");
                const body = { username, password };
                if (totpGroup.style.display !== "none" && totpInput.value.trim()) {
                    body.totp_code = totpInput.value.trim();
                }
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (!response.ok) {
                    // MFA activée : le serveur redemande le champ code sans compter d'échec
                    if (data.detail && typeof data.detail === "object" && data.detail.totp_required) {
                        totpGroup.style.display = "block";
                        totpInput.required = true;
                        totpInput.focus();
                        errorMessage.textContent = data.detail.message || "Code de vérification requis.";
                    } else {
                        errorMessage.textContent = (typeof data.detail === "string" && data.detail)
                            || "Identifiants incorrects.";
                    }
                    errorBanner.style.display = "flex";
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Se Connecter";
                    return;
                }

                // Redirect to dashboard on successful authentication
                window.location.href = "/";
            } catch (err) {
                console.error("Login request error:", err);
                errorMessage.textContent = "Erreur de connexion au serveur.";
                errorBanner.style.display = "flex";
                submitBtn.disabled = false;
                submitBtn.textContent = "Se Connecter";
            }
        }
    </script>
</body>
</html>
