name: CI

on:
  push:
    branches: ["master", "claude/**"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

# Un push qui en remplace un autre sur la même branche annule le run précédent
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate config.yaml
        run: python -c "import yaml; yaml.safe_load(open('config.yaml')); print('config.yaml OK')"

      - name: Import smoke test
        run: python -c "from fiskr.api import app; print('fiskr.api import OK')"

      # La suite s'exécute sur le repli SQLite (aucun PostgreSQL requis en CI)
      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

  frontend-syntax:
    name: Dashboard JS syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Tous les fichiers JS servis par le dashboard (app.js, i18n.js, futurs modules)
      - name: Syntax-check dashboard JS
        run: |
          set -e
          for f in fiskr/static/*.js; do
            echo "node --check $f"
            node --check "$f"
          done
