# Fiskr - Global Configuration

blocking:
  strategy: "standard_performance"
  custom_key_layout:
    - "COUNTRY_ISO"
    - "ENTITY_TYPE"
    - "PHONETIC_FIRST"

scoring:
  cut_off_threshold: 75.0
  # Seuils par type de liste (surcharge du seuil global) — ex. tolerer un
  # seuil plus haut sur les PEP que sur le gel des avoirs :
  # cut_off_overrides:
  #   WATCHLIST_PEP: 85.0
  #   WATCHLIST_DGT: 70.0
  cut_off_overrides: {}
  weights:
    jaro_winkler: 0.4
    damerau_levenshtein: 0.4
    token_sort: 0.2
  contextual_rules:
    dob_tolerance_window: 2  # years
    dob_exact_bonus: 15
    dob_tolerance_bonus: 5
    dob_out_of_window_malus: -15
    gender_conflict_malus: -20
    geography_match_bonus: 10
    geography_no_match_malus: -10

database:
  url: "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
  fallback_to_sqlite: true
  sqlite_path: "fiskr.sqlite3"

# Mode homologation : environnement de validation avant mise en production.
# Ces valeurs sont des defauts : un admin peut les modifier a chaud depuis le
# dashboard (elles sont alors stockees en base et priment sur ce fichier).
ingestion:
  require_approval: false   # true = tout snapshot watchlist entrant attend un pointage humain
  auto_rescreen: true       # re-criblage automatique du referentiel clients apres chaque mise a jour de liste
review:
  exclusion_justification_required: true   # justification texte obligatoire lors d'une exclusion
  exclusion_file_required: false           # piece jointe justificative obligatoire lors d'une exclusion
  alert_four_eyes_required: true           # validation 4-yeux des decisions d'alertes (validateur != proposeur)
  whitelist_justification_required: true   # justification obligatoire pour une mise en liste blanche
  whitelist_file_required: false           # piece jointe obligatoire pour une mise en liste blanche

# Synchronisation automatique des sources officielles (OFAC / EUR-Lex)
sync:
  auto_enabled: false        # true = execution automatique chaque matin
  schedule_time: "06:00"     # heure locale de declenchement quotidien (HH:MM)
  # Fiabilite reseau : les retries couvrent les erreurs de connexion/timeout
  # (httpx.TransportError) ET les statuts HTTP transitoires (429, 5xx...).
  network:
    timeout_seconds: 60            # timeout de lecture des requetes texte (scraping, API)
    download_timeout_seconds: 120  # timeout de lecture par bloc des telechargements de fichiers
    retries: 3                     # tentatives supplementaires apres un echec transitoire
    backoff_seconds: 3             # attente entre tentatives (lineaire : 3s, 6s, 9s...)
    user_agent: "Mozilla/5.0 (compatible; Fiskr-Compliance/2.4; +https://github.com/fongkhan/Fiskr)"
  ofac:
    enabled: true
    url: "https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN_ADVANCED.XML"
  eurlex:
    enabled: true
    # Version anglaise du Journal Officiel : reference reglementaire retenue.
    # {date} est remplace par la date du jour au format DDMMYYYY
    daily_journal_url: "https://eur-lex.europa.eu/oj/daily-view/L-series/default.html?ojDate={date}&locale=en"
    keyword: "restrictive measures"
  # Registre national des gels des avoirs (DGT) : obligation autonome pour les
  # etablissements assujettis francais (lignes directrices ACPR/DGT).
  dgt:
    enabled: true
    url: "https://gels-avoirs.dgtresor.gouv.fr/ApiPublic/api/v1/publication/derniere-publication-fichier-json"
  # Liste consolidee officielle des sanctions financieres de l'UE (fichiers FSF).
  # Fait autorite sur le scraping du JO (radiations fiables). Necessite un token :
  # inscription gratuite sur le webgate FSD de la Commission, puis renseigner
  # sync.eu_fsf.token et passer enabled a true.
  eu_fsf:
    enabled: false
    url: "https://webgate.ec.europa.eu/fsd/fsf/public/files/xmlFullSanctionsList_1_1/content?token={token}"
    token: ""
  # Liste consolidee du Conseil de securite de l'ONU (publique, sans token)
  un:
    enabled: true
    url: "https://scsanctions.un.org/resources/xml/en/consolidated.xml"
  # Dataset PEP OpenSanctions. ATTENTION licence : usage non commercial libre,
  # licence OpenSanctions requise pour un usage commercial (opensanctions.org/licensing).
  pep:
    enabled: false
    url: "https://data.opensanctions.org/datasets/latest/peps/targets.simple.csv"
  # Liste consolidee UK OFSI (HM Treasury) - opt-in selon l'exposition UK
  ofsi:
    enabled: false
    url: "https://ofsistorage.blob.core.windows.net/publishlive/2022format/ConList.csv"

# Recherche adverse media (revue de presse negative) : purement informative
# pour l'analyste, ne modifie jamais un score ni un statut de criblage.
adverse_media:
  enabled: true
  provider: "google_news_rss"   # flux RSS public Google News (gratuit, remplacable)
  language: "fr"
  max_results: 10
  # Mots-cles LCB-FT combines au nom recherche (vide = liste par defaut)
  keywords: []

# Narratifs d'alertes : projet de narratif genere depuis le decision_tree
# (deterministe, donc contexte fiable). La decision reste humaine (4-yeux).
narrative:
  llm_enabled: false            # true = reformulation en prose via l'API Claude
  llm_model: "claude-opus-4-8"  # necessite ANTHROPIC_API_KEY et `pip install anthropic`

# Identite de l'etablissement declarant : pre-remplit la rubrique
# « declarant » des projets de declaration de soupcon TRACFIN.
institution:
  name: "Etablissement Fiskr (a configurer)"
  siren: ""
  correspondent_name: ""       # correspondant/declarant TRACFIN designe
  correspondent_email: ""
  correspondent_phone: ""

# Webhooks ENTRANTS (SI amont -> Fiskr) : criblage temps reel et upsert de
# fiches clients. Authentifies par cle d'API fsk_ ; si `secret` est renseigne,
# l'en-tete X-Fiskr-Signature (HMAC-SHA256 hexadecimal du corps brut) devient
# OBLIGATOIRE sur ces endpoints.
hooks:
  secret: ""

# Regles anti-faux positifs : generation d'un brouillon de regle depuis une
# instruction en langage naturel (API Claude). Le brouillon suit ensuite le
# circuit normal : tests unitaires, soumission, validation 4-yeux.
fprules:
  llm_enabled: false            # true = bouton "Générer par IA" dans l'éditeur de règles
  llm_model: "claude-sonnet-5"  # necessite ANTHROPIC_API_KEY et `pip install anthropic`

# Smart Sanctions Ingestion Engine (SSIE) - Connecteur XML generique agnostique
# Les selecteurs de balises pivots sont surchargables lors de chaque import.
ssie:
  source_format: "OFAC_ADVANCED_v1"
  selectors:
    reference_root_tag: ".//ReferenceValueList"
    reference_item_tag: "ReferenceValue"
    entity_root_tag: ".//DistinctParty"
    entity_feature_tag: "Feature"
    mapping_id_attr: "ID"
    mapping_link_attr: "FeatureTypeID"


# Notifications metier (email SMTP + webhooks generiques)
# Les evenements actifs se reglent a chaud (Parametres > notifications.events) ;
# les webhooks recoivent un POST JSON {event, label, at, data}.
notifications:
  webhooks: []                  # ex. ["https://hooks.example.com/fiskr"]

# Criblage batch (campagnes persistees) + inbox CFT
# inbox_dir : repertoire ou le moniteur de transfert (CFT/SFTP) depose les
# fichiers clients CSV — chaque fichier stable devient une campagne criblee
# automatiquement puis est archive. Vide = scrutation desactivee.
batch:
  inbox_dir: ""
  inbox_poll_seconds: 60
  archive_dir: ""               # defaut : <inbox_dir>/archive

# Securite des acces
security:
  max_login_failures: 5         # echecs consecutifs avant verrouillage
  lockout_minutes: 15           # duree du verrouillage temporaire
  min_password_length: 12       # politique de mots de passe (comptes humains)
  session_hours: 8              # duree de session (JWT + cookie)
  secure_cookies: false         # true derriere HTTPS (flag Secure)
  cookie_samesite: "strict"
